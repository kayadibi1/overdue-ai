name: Verify sources
# Daily-ish source verification: link health, quote-drift, Wayback archival, staleness,
# Class-A fulfillment proposals, and Class-B LLM adjudication (subscription-billed).
# Writes machine state to src/data/verification.json and opens deduped GitHub issues.
#
# NO `push:` trigger — so this workflow's own commit-back can never retrigger it.
# The verification.json commit (NOT [skip ci]) intentionally triggers the deploy
# workflows to refresh on-site badges; the .watcher commit ([skip ci]) does not.
# (Every run is currently a full run; a "hot-rows only" ±7-day optimization is future work.)
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: verify-sources-main
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci

      # Emits dist/commitments.json for the verify + adjudicate scripts. This build
      # reads the OLD verification.json and is throwaway — only the commit-back's
      # downstream deploy workflows publish the site.
      - run: npm run build

      # Link health + quote-drift + Wayback archival + staleness + Class-A proposals.
      # Writes src/data/verification.json (guarded) and upserts watcher GitHub issues.
      - name: Source verification
        run: npm run watch -- --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Class-B adjudication on the maintainer's Claude subscription. The script
      # strips ANTHROPIC_API_KEY/ANTHROPIC_AUTH_TOKEN so the OAuth token (sub) pays,
      # times out, and degrades to "needs manual adjudication" on any failure.
      - name: Class-B adjudication (subscription-billed)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          npm i -g @anthropic-ai/claude-code@2.1.183
          npm run adjudicate || echo "adjudication skipped (see report/issues)"

      # Commit-back, two targets with DIFFERENT rules (identity: the bot, per watch.yml):
      #  - .watcher/** is path-ignored by the deploy workflows AND marked [skip ci].
      - name: Commit watcher state ([skip ci])
        run: |
          if [ -n "$(git status --porcelain .watcher)" ]; then
            git config user.name 'overdue-watcher'
            git config user.email 'actions@github.com'
            git add .watcher
            git commit -m 'chore(watcher): update state [skip ci]'
            git pull --rebase origin main || true
            git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main)
          else
            echo "no watcher state change"
          fi

      #  - src/data/verification.json is committed WITHOUT [skip ci] only when it
      #    changed, so it deliberately triggers the deploys to refresh the badges.
      - name: Commit verification badges (refresh deploy)
        run: |
          if ! git diff --quiet src/data/verification.json; then
            git config user.name 'overdue-watcher'
            git config user.email 'actions@github.com'
            git add src/data/verification.json
            git commit -m 'chore(verify): refresh verification badges'
            git pull --rebase origin main || true
            git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main)
          else
            echo "no verification change"
          fi
